name: Enterprise Core-Auth CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  compliance-and-testing:
    runs-on: ubuntu-latest

    # 1. Environment Spawn: Spin up background services 
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: supersecretpassword
          POSTGRES_DB: core_auth_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install System Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio httpx ruff bandit email-validator

      # 2. Linter Engine: Check syntax and PEP8 standards 
      - name: Run Linter Engine (Ruff)
        run: |
          ruff check app/ tests/

      # 3. Static Security Audits: Scan for hardcoded credentials & weak crypto 
      - name: Run Static Security Audit (Bandit)
        run: |
          bandit -r app/ --skip B104,B105

      # 4. Asynchronous Suites: Execute full integration tests 
      - name: Run End-to-End Test Sequence
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:supersecretpassword@localhost:5432/core_auth_test
          REDIS_URL: redis://localhost:6379/0
          ACCESS_SECRET_KEY: ci-cd-temporary-access-secret
          REFRESH_SECRET_KEY: ci-cd-temporary-refresh-secret
        run: |
          pytest -v